<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpellFinder</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
  }
  h1 {
    margin-bottom: 10px;
  }
  .input-row {
    margin-bottom: 10px;
  }
  label {
    display: inline-block;
    width: 140px;
    font-weight: bold;
  }
  input {
    padding: 5px;
    width: 200px;
  }
  button {
    padding: 8px 16px;
    margin-right: 10px;
    cursor: pointer;
  }
  #results {
    white-space: pre;
    background: #fff;
    padding: 15px;
    border: 1px solid #ccc;
    margin-top: 20px;
    min-height: 200px;
  }
</style>
</head>

<body>

<h1>SpellFinder</h1>

<div class="input-row">
  <label>Available Letters:</label>
  <input id="letters" type="text">
</div>

<div class="input-row">
  <label>Required Letter:</label>
  <input id="required" type="text">
</div>

<button onclick="solve()">Solve</button>
<button onclick="clearAll()">Clear</button>

<div id="results">Loading wordbase.txt…</div>

<script>
// GLOBAL word list
let words = [];

// DOM references
const lettersEl = document.getElementById("letters");
const requiredEl = document.getElementById("required");
const resultsEl = document.getElementById("results");

// Load dictionary on startup
fetch("https://raw.githubusercontent.com/erichague76/spelll/main/wordbase.txt")
  .then(r => r.text())
  .then(text => {
    console.log("Loaded word list:", text.substring(0, 200) + "...");

    const raw = text.toLowerCase().trim();

    const list = raw.includes("\n")
      ? raw.split(/\r?\n/)
      : raw.split(/\s+/);

    words = list
      .map(w => w.trim())
      .filter(w => /^[a-z]+$/.test(w)); // alphabetic only

    console.log("Total words loaded:", words.length);
    resultsEl.textContent = "Dictionary loaded. Enter letters to begin.";
  })
  .catch(err => {
    console.error("Error loading word list:", err);
    resultsEl.textContent = "Failed to load wordbase.txt";
  });


// Clear UI
function clearAll() {
  lettersEl.value = "";
  requiredEl.value = "";
  resultsEl.textContent = "";
  lettersEl.focus();
}


// Solve function
function solve() {
  const letters = lettersEl.value.toLowerCase().trim();
  const required = requiredEl.value.toLowerCase().trim();

  if (!letters || !required) {
    resultsEl.textContent = "Enter letters and required letter.";
    return;
  }

  const matches = words.filter(w =>
    w.includes(required) &&
    [...w].every(ch => letters.includes(ch))
  );

  matches.sort();

  if (!matches.length) {
    resultsEl.textContent = "No matching words found.";
    return;
  }

  // Format into columns like Tkinter
  const colCount = 6;
  const colWidth = 12;

  let out = `${matches.length} matching words:\n\n`;
  for (let i = 0; i < matches.length; i += colCount) {
    const row = matches.slice(i, i + colCount);
    out += row
      .map(word => (word + " ".repeat(colWidth)).slice(0, colWidth))
      .join("") + "\n";
  }

  resultsEl.textContent = out;
}
</script>

</body>
</html>
