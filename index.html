<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SpellFinder</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2b;
      --text: #e7eefc;
      --muted: #9db0d1;
      --accent: #5aa7ff;
      --border: rgba(255,255,255,.12);
    }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #152145 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .title { font-size: 28px; font-weight: 800; letter-spacing: .3px; }
    .subtitle { color: var(--muted); margin-top: 6px; }
    .card {
      margin-top: 18px;
      background: rgba(18,26,43,.86);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline: none;
      font-size: 16px;
      letter-spacing: .5px;
    }
    input:focus { border-color: rgba(90,167,255,.7); box-shadow: 0 0 0 4px rgba(90,167,255,.12); }

    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
    button {
      appearance: none;
      border: 1px solid rgba(90,167,255,.55);
      background: linear-gradient(180deg, rgba(90,167,255,.25), rgba(90,167,255,.10));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { border-color: rgba(90,167,255,.9); }
    button.secondary { border-color: var(--border); background: rgba(255,255,255,.05); font-weight: 650; }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    pre {
      margin: 14px 0 0 0;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.25);
      overflow: auto;
      min-height: 240px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.35;
    }
    .hint { margin-top: 10px; color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      margin-left: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">SpellFinder <span class="pill">GitHub Pages</span></div>
    <div class="subtitle">Find words made from your letters that include a required letter.</div>

    <div class="card">
      <div class="row">
        <div>
          <label for="letters">Enter letters (usually 7)</label>
          <input id="letters" placeholder="e.g. aelnrst" autocomplete="off" />
        </div>
        <div>
          <label for="required">Required letter (1 letter)</label>
          <input id="required" placeholder="e.g. a" maxlength="1" autocomplete="off" />
        </div>
      </div>

      <div class="actions">
        <button id="findBtn">Find Words</button>
        <button id="clearBtn" class="secondary">Clear</button>
        <span id="status" class="status">Loading wordbase.txt…</span>
      </div>

      <pre id="results">Loading…</pre>

      <div class="hint">
        Make sure <b>wordbase.txt</b> is in the <b>same folder</b> as this <b>index.html</b> in your repo.
      </div>
    </div>
  </div>

  <script>
    // ---- SpellFinder Web (single-file) ----
    // Requires: wordbase.txt located next to index.html in the repo.

    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const lettersEl = document.getElementById("letters");
    const requiredEl = document.getElementById("required");
    const findBtn = document.getElementById("findBtn");
    const clearBtn = document.getElementById("clearBtn");

    let words = [];

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function normalizeLetters(s) {
      return (s || "").toLowerCase().replace(/[^a-z]/g, "");
    }

    function runFilter() {
      const allowedRaw = normalizeLetters(lettersEl.value);
      const required = normalizeLetters(requiredEl.value).slice(0, 1);

      resultsEl.textContent = "";

      if (!allowedRaw) {
        resultsEl.textContent = "Please enter letters (a-z only).";
        return;
      }
      if (!required || required.length !== 1) {
        resultsEl.textContent = "Required letter must be exactly ONE letter (a-z).";
        return;
      }

      const allowedSet = new Set(allowedRaw.split(""));
      if (!allowedSet.has(required)) {
        resultsEl.textContent =
          "Required letter is not in your allowed letters.\n" +
          "Add it to the letters, or change the required letter.";
        return;
      }

      if (!words.length) {
        resultsEl.textContent =
          "Word list not loaded.\nMake sure wordbase.txt exists in the repo next to index.html.";
        return;
      }

      // Filter: required letter present, and all letters in word are allowed.
      const matches = [];
      for (const w of words) {
        if (!w) continue;
        if (!w.includes(required)) continue;

        let ok = true;
        for (let i = 0; i < w.length; i++) {
          if (!allowedSet.has(w[i])) { ok = false; break; }
        }
        if (ok) matches.push(w);
      }

      matches.sort();

      if (!matches.length) {
        resultsEl.textContent = "No matching words found.";
        return;
      }

      // Format into columns similar to your Tkinter output
      const colCount = 6;
      const colWidth = 12;

      let out = `${matches.length} matching words:\n\n`;
      for (let i = 0; i < matches.length; i += colCount) {
        const row = matches.slice(i, i + colCount);
        out += row.map(word => (word + " ".repeat(colWidth)).slice(0, colWidth)).join("") + "\n";
      }
      resultsEl.textContent = out;
    }

    function clearAll() {
      lettersEl.value = "";
      requiredEl.value = "";
      resultsEl.textContent = "";
      lettersEl.focus();
    }

    // Load wordbase.txt (same folder)
    fetch("wordbase.txt")
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.text();
      })
      .then(text => {
        // Accept either newline-delimited OR space-delimited word lists
        // (Your wordbase file appears space-separated in places.)
        const raw = text.toLowerCase().trim();
        const list = raw.includes("\n") ? raw.split(/\r?\n/) : raw.split(/\s+/);

        words = list
          .map(w => w.trim())
          .filter(w => /^[a-z]+$/.test(w)); // keep alphabetic only

        setStatus(`Loaded ${words.length.toLocaleString()} words from wordbase.txt`);
        resultsEl.textContent = "Ready. Enter letters and a required letter, then click “Find Words”.";
        lettersEl.focus();
      })
      .catch(err => {
        setStatus("Could not load wordbase.txt");
        resultsEl.textContent =
          "ERROR: Couldn't load wordbase.txt.\n\n" +
          "Fix:\n" +
          "1) Put wordbase.txt in the SAME folder as index.html\n" +
          "2) Commit + push to GitHub\n" +
          "3) Enable GitHub Pages (Settings → Pages)\n\n" +
          `Details: ${err}`;
      });

    findBtn.addEventListener("click", runFilter);
    clearBtn.addEventListener("click", clearAll);

    // Press Enter to run
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runFilter();
    });
  </script>
</body>
</html>
