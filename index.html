<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SpellFinder (Phone Ready)</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --text:#e9eefc;
      --muted:#aab6d6;
      --accent:#5da8ff;
      --bad:#ff6b6b;
      --border:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #14214a 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(720px, 100%);
      background: color-mix(in srgb, var(--card) 92%, black 8%);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      padding:16px;
    }
    header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }
    h1{margin:0;font-size:20px;letter-spacing:.2px}
    .sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.35}
    .pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px){
      .grid{ grid-template-columns: 1.1fr .9fr; align-items:start; }
    }
    .card{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background: rgba(255,255,255,.04);
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:10px 0 6px;
    }
    input[type="text"], textarea{
      width:100%;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      color:var(--text);
      padding:12px 12px;
      font-size:16px;
      outline:none;
    }
    input[type="file"]{
      width:100%;
      color:var(--muted);
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .row .span2{ grid-column: 1 / -1; }
    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }
    button{
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding:12px 14px;
      border-radius:14px;
      font-weight:700;
      cursor:pointer;
      flex: 1 1 140px;
      transition: transform .05s ease, background .2s ease;
      font-size:15px;
    }
    button:hover{ background: rgba(255,255,255,.10); }
    button:active{ transform: scale(.99); }
    button.primary{
      background: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,.06) 72%);
      border-color: color-mix(in srgb, var(--accent) 40%, rgba(255,255,255,.12) 60%);
    }
    button.danger{
      background: color-mix(in srgb, var(--bad) 22%, rgba(255,255,255,.06) 78%);
      border-color: color-mix(in srgb, var(--bad) 35%, rgba(255,255,255,.12) 65%);
    }
    .status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height: 1.6em;
      line-height:1.35;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:13px;
      white-space:pre;
      overflow:auto;
      max-height: 55svh;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      padding:12px;
    }
    .tiny{
      font-size:12px;color:var(--muted);margin-top:8px;line-height:1.35
    }
    .warn{ color: #ffd27a; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>SpellFinder</h1>
        <div class="sub">
          Upload your word list (one word per line) or paste it. Then enter 7 letters + required letter.
        </div>
      </div>
      <div class="pill" id="pill">No word list loaded</div>
    </header>

    <div class="grid">
      <div class="card">
        <label>Word list (.txt) upload</label>
        <input id="file" type="file" accept=".txt,text/plain" />

        <label>Or paste word list (one word per line)</label>
        <textarea id="wordsPaste" rows="6" placeholder="example&#10;another&#10;words"></textarea>

        <div class="row">
          <div>
            <label>Enter 7 letters</label>
            <input id="letters" type="text" inputmode="text" autocapitalize="none" autocomplete="off" spellcheck="false" placeholder="abcdefg" />
          </div>
          <div>
            <label>Required letter</label>
            <input id="required" type="text" inputmode="text" autocapitalize="none" autocomplete="off" spellcheck="false" placeholder="a" />
          </div>

          <div class="span2 btns">
            <button class="primary" id="find">Find Words</button>
            <button id="copy">Copy Results</button>
            <button class="danger" id="clear">Clear</button>
          </div>
        </div>

        <div class="status" id="status"></div>
        <div class="tiny">
          Tips: letters can include duplicates; filtering uses unique letters (like your Python <code>set()</code> logic). Required letter must appear in the word.
        </div>
      </div>

      <div class="card">
        <div class="mono" id="results">(results will appear here)</div>
        <div class="tiny warn" id="hint"></div>
      </div>
    </div>
  </div>

<script>
  // ----------------------------
  // State
  // ----------------------------
  let WORDS = [];

  const el = (id) => document.getElementById(id);
  const pill = el("pill");
  const status = el("status");
  const results = el("results");
  const hint = el("hint");

  function setPill(text, ok=false){
    pill.textContent = text;
    pill.style.color = ok ? "#b9ffd1" : "var(--muted)";
    pill.style.borderColor = ok ? "rgba(185,255,209,.35)" : "rgba(255,255,255,.12)";
  }

  function setStatus(text, warn=false){
    status.textContent = text || "";
    status.style.color = warn ? "#ffd27a" : "var(--muted)";
  }

  function sanitizeLetters(s){
    // keep only a-z
    return (s || "").toLowerCase().replace(/[^a-z]/g, "");
  }

  function loadWordsFromText(text){
    // Similar to: [line.strip() for line in file if line.strip().isalpha()]
    const lines = (text || "").split(/\r?\n/);
    const out = [];
    for(const line of lines){
      const w = line.trim().toLowerCase();
      if(w && /^[a-z]+$/.test(w)) out.push(w);
    }
    return out;
  }

  // ----------------------------
  // Filtering logic (ported)
  // ----------------------------
  function filterWords(words, allowedLetters, requiredLetter){
    const allowedSet = new Set(allowedLetters.split(""));
    const req = requiredLetter;
    if(!req) return [];
    return words.filter(word => {
      if(!word.includes(req)) return false;
      for(const ch of word){
        if(!allowedSet.has(ch)) return false;
      }
      return true;
    });
  }

  function formatMatches(matches){
    // like your tkinter: 6 columns, left-justified width 12
    const colCount = 6;
    const colWidth = 12;
    let out = `${matches.length} matching words:\n\n`;
    for(let i=0;i<matches.length;i+=colCount){
      const row = matches.slice(i, i+colCount);
      const justified = row.map(w => (w + " ".repeat(colWidth)).slice(0, colWidth)).join("");
      out += justified + "\n";
    }
    return out.trimEnd();
  }

  // ----------------------------
  // UI actions
  // ----------------------------
  function run(){
    hint.textContent = "";
    const letters = sanitizeLetters(el("letters").value);
    const required = sanitizeLetters(el("required").value).slice(0,1);

    el("letters").value = letters;
    el("required").value = required;

    if(WORDS.length === 0){
      setStatus("Load a word list first (upload a .txt or paste words).", true);
      results.textContent = "(no word list loaded)";
      return;
    }
    if(letters.length === 0){
      setStatus("Enter your 7 letters.", true);
      results.textContent = "(waiting for input)";
      return;
    }
    if(required.length !== 1){
      setStatus("Enter exactly 1 required letter.", true);
      results.textContent = "(waiting for input)";
      return;
    }

    const matches = filterWords(WORDS, letters, required).sort();
    if(matches.length === 0){
      results.textContent = "No matching words found.";
      setStatus("No matches. Try different letters / required letter.", true);
      return;
    }

    results.textContent = formatMatches(matches);
    setStatus(`Found ${matches.length} matches.`, false);
  }

  async function copyResults(){
    const text = results.textContent || "";
    if(!text || text.startsWith("(results")){
      setStatus("Nothing to copy yet.", true);
      return;
    }
    try{
      await navigator.clipboard.writeText(text);
      setStatus("Copied results to clipboard ✅");
    }catch(e){
      setStatus("Copy failed (browser blocked). You can select text and copy manually.", true);
    }
  }

  function clearAll(){
    el("letters").value = "";
    el("required").value = "";
    el("wordsPaste").value = "";
    WORDS = [];
    results.textContent = "(results will appear here)";
    setStatus("");
    setPill("No word list loaded");
    hint.textContent = "";
  }

  // ----------------------------
  // File upload handling
  // ----------------------------
  el("file").addEventListener("change", async (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if(!f) return;
    try{
      const text = await f.text();
      WORDS = loadWordsFromText(text);
      if(WORDS.length){
        setPill(`${WORDS.length} words loaded`, true);
        setStatus("Word list loaded. Enter letters and tap Find Words.");
        hint.textContent = "";
      }else{
        setPill("No valid words found");
        setStatus("That file didn’t contain valid words (a–z only, one per line).", true);
      }
    }catch(e){
      setPill("Load failed");
      setStatus("Couldn’t read the file.", true);
    }
  });

  // Paste box: if user pastes/types, treat that as the source (manual override)
  el("wordsPaste").addEventListener("input", () => {
    const text = el("wordsPaste").value;
    const words = loadWordsFromText(text);
    if(words.length){
      WORDS = words;
      setPill(`${WORDS.length} words loaded (pasted)`, true);
      setStatus("Pasted list loaded. Enter letters and tap Find Words.");
    }else if(text.trim().length){
      setPill("No valid words found");
      setStatus("Paste contains no valid words yet (a–z only).", true);
    }
  });

  // Buttons
  el("find").addEventListener("click", run);
  el("copy").addEventListener("click", copyResults);
  el("clear").addEventListener("click", clearAll);

  // Improve mobile UX: auto-run when user hits Enter in required field
  el("required").addEventListener("keydown", (e) => {
    if(e.key === "Enter") run();
  });

  // ----------------------------
  // Auto-load default wordbase.txt WITHOUT showing it in textarea
  // ----------------------------
  async function loadDefaultWordBase(){
    try{
      const response = await fetch("wordbase.txt");
      if(!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();

      // Do NOT display text in textarea:
      // el("wordsPaste").value = text;

      // Use it as the active list
      WORDS = loadWordsFromText(text);

      if(WORDS.length){
        setPill(`${WORDS.length} words loaded (default)`, true);
        setStatus("Default word base loaded. Enter letters and tap Find Words.");
        hint.textContent = "";
      }else{
        setPill("No valid words found");
        setStatus("wordbase.txt loaded, but it contains no valid a–z words.", true);
      }
    }catch(err){
      console.error("Could not load wordbase.txt", err);
      setPill("Default load failed");
      setStatus("Could not load wordbase.txt. Check console / file path.", true);
    }
  }

  // initial
  setStatus("Upload your SpellFinder.txt, paste words, or use the default wordbase.");
  window.addEventListener("DOMContentLoaded", loadDefaultWordBase);
</script>

</body>
</html>
